<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head}">
    <title>Quản lý chi tiết phòng đặt</title>
</head>
<body th:replace="~{layout/base :: main('booking_room', ~{:: #booking-room-content})}">

<div id="booking-room-content">

    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show rounded-0 py-2 small mb-3"
         role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close py-2 shadow-none" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show rounded-0 py-2 small mb-3"
         role="alert">
        <i class="bi bi-check-circle-fill me-2"></i>
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close py-2 shadow-none" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="table-responsive border shadow-sm">
        <table class="table table-striped table-hover mb-0 align-middle text-center">
            <thead class="table-dark">
            <tr>
                <th colspan="5">
                    <div class="d-flex align-items-center gap-2 py-1">
                        <button type="button" class="btn btn-sm btn-dark rounded-0 fw-bold"
                                data-bs-toggle="modal" data-bs-target="#addBookingRoomModal">
                            Thêm phòng vào đơn
                        </button>
                        <button type="button" class="btn btn-sm btn-danger rounded-0 fw-bold"
                                th:onclick="|deleteMulti('@{/api/booking_rooms}', 'booking-room')|">
                            Xoá
                        </button>
                    </div>
                </th>
            </tr>
            <tr>
                <th style="width: 40px; vertical-align: middle;">
                    <input type="checkbox" onclick="selectAllCheckbox(this.id, 'action-select-booking-room')"
                           id="selectAllBookingRoom">
                </th>
                <th>Khách hàng đặt phòng</th>
                <th>Số phòng</th>
                <th>Giá lúc đặt</th>
                <th>Thao tác</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="br : ${bookingRooms}">
                <td style="vertical-align: middle;">
                    <input type="checkbox" class="action-select-booking-room"
                           th:value="${br.id}"
                           th:data-id="${br.id}"
                           onclick="resetSelectAllCheckBox('selectAllBookingRoom', 'action-select-booking-room')">
                </td>
                <td class="fw-bold text-secondary" th:text="'#' + ${br.bookingCustomerName}"></td>

                <td class="fw-bold text-dark" th:text="'Phòng ' + ${br.roomName}"></td>

                <td class="fw-bold text-danger"
                    th:text="${#numbers.formatDecimal(br.priceAtBooking, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>
                <td>
                    <button type="button" class="btn btn-sm btn-dark rounded-0 me-1 fw-bold"
                            th:data-id="${br.id}"
                            th:data-bookingid="${br.bookingId}"
                            th:data-roomid="${br.roomId}"
                            th:data-priceatbooking="${br.priceAtBooking}"
                            onclick="openEditModal(this, 'BookingRoom')">
                        Sửa
                    </button>

                    <button th:id="|deleteBookingRoom-${br.id}|"
                            th:onclick="|deleteDetail('@{/api/booking_rooms/{id}(id=${br.id})}')|" type="button"
                            class="btn btn-sm btn-outline-danger rounded-0 fw-bold">Xoá
                    </button>
                </td>
            </tr>

            <tr th:if="${#lists.isEmpty(bookingRooms)}">
                <td colspan="5" class="text-muted py-4">Chưa có phòng nào được gán vào đơn đặt trong hệ thống.</td>
            </tr>
            </tbody>
        </table>
    </div>

    <div th:replace="~{modals/base :: genericModal(
        'addBookingRoomModal',
        'Gán thêm phòng vào đơn đặt',
        ~{:: bookingRoomForm('add')}
    )}"></div>

    <div th:replace="~{modals/base :: genericModal(
        'editBookingRoomModal',
        'Sửa thông tin phòng đặt',
        ~{:: bookingRoomForm('edit')}
    )}"></div>

</div>
</body>
</html>

<div th:fragment="bookingRoomForm(type)">
    <form method="POST" th:action="@{/admin/booking_rooms}" th:object="${bookingRoom}">
        <div class="modal-body p-4">
            <input type="hidden" name="id" th:id="${type + 'BookingRoomId'}">

            <div class="row mb-3 align-items-center">
                <label class="col-sm-3 col-form-label text-end fw-bold small">Đơn đặt (Khách):</label>
                <div class="col-sm-9">
                    <select name="bookingId" th:id="${type + 'BookingRoomBookingid'}"
                            class="form-select form-select-sm rounded-0 shadow-none" required>
                        <option value="" disabled selected>-- Chọn đơn đặt phòng --</option>
                        <option th:each="b : ${allBookings}"
                                th:value="${b.id}"
                                th:text="'#' + ${b.id} + ' - ' + ${b.customerName}">
                        </option>
                    </select>
                </div>
            </div>

            <div class="row mb-3 align-items-center">
                <label class="col-sm-3 col-form-label text-end fw-bold small">Chọn phòng:</label>
                <div class="col-sm-9">
                    <select name="roomId" th:id="${type + 'BookingRoomRoomid'}"
                            class="form-select form-select-sm rounded-0 shadow-none" required>
                        <option value="" disabled selected>-- Chọn phòng --</option>
                        <option th:each="r : ${allRooms}"
                                th:value="${r.id}"
                                th:text="'Phòng ' + ${r.name}">
                        </option>
                    </select>
                </div>
            </div>

            <div class="row mb-3 align-items-center">
                <label class="col-sm-3 col-form-label text-end fw-bold small">Giá lúc đặt:</label>
                <div class="col-sm-9">
                    <input type="number" name="priceAtBooking" th:id="${type + 'BookingRoomPriceatbooking'}"
                           class="form-control form-control-sm rounded-0 shadow-none" placeholder="0" required>
                </div>
            </div>
        </div>

        <div class="modal-footer bg-light py-2 border-top-0 d-flex justify-content-end gap-2">
            <button type="button" class="btn btn-outline-secondary btn-sm px-4 rounded-0" data-bs-dismiss="modal">Hủy
            </button>
            <button type="submit" class="btn btn-dark btn-sm px-4 rounded-0 fw-bold">Lưu thay đổi</button>
        </div>
    </form>
</div>
