<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head}">
    <title>Bảng điều khiển Admin</title>
</head>

<body th:replace="~{layout/base :: main('dashboard', ~{:: #dashboard-content})}">

<div id="dashboard-content">
    <div class="container-fluid py-2">
        <h3 class="mb-4 text-secondary"><i class="bi bi-graph-up-arrow me-2"></i>Tổng Quan Hệ Thống</h3>

        <div class="row mb-4">
            <div class="col-md-4">
                <div class="card text-white shadow-sm border-0" style="background-color: #0194f3; border-radius: 10px;">
                    <div class="card-body d-flex align-items-center">
                        <div class="me-3">
                            <i class="bi bi-house-check" style="font-size: 2.5rem;"></i>
                        </div>
                        <div>
                            <h6 class="card-title mb-1 text-light">Tỷ lệ lấp phòng hôm nay</h6>
                            <h2 id="occupancyRate" class="fw-bold mb-0">Đang tải...</h2>
                        </div>
                    </div>
                </div>
            </div>

        </div>

        <div class="row">
            <div class="col-md-12">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-white border-bottom py-3">
                        <h5 class="mb-0 text-dark">Doanh thu theo tháng (Năm <span id="currentYear"></span>)</h5>
                    </div>
                    <div class="card-body">
                        <canvas id="revenueChart" style="max-height: 400px;"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script th:inline="javascript">
        document.addEventListener('DOMContentLoaded', function() {
            const year = new Date().getFullYear();
            document.getElementById('currentYear').innerText = year;

            // Lấy Context Path tự động từ Thymeleaf
            const contextPath = /*[[@{/}]]*/ '/';

            // --- GỌI API 1: TỶ LỆ LẤP PHÒNG ---
            fetch(`${contextPath}api/admin/stats/occupancy`)
                .then(response => response.json())
                .then(data => {
                    document.getElementById('occupancyRate').innerText = data.occupancyRate + '%';
                })
                .catch(error => {
                    console.error("Lỗi:", error);
                    document.getElementById('occupancyRate').innerText = "0%";
                });

            // --- GỌI API 2: BIỂU ĐỒ DOANH THU ---
            fetch(`${contextPath}api/admin/stats/revenue-month?year=${year}`)
                .then(response => response.json())
                .then(data => {
                    // Tách dữ liệu
                    const labels = data.map(item => 'Tháng ' + item[0]);
                    const amounts = data.map(item => item[1]);

                    // Vẽ biểu đồ
                    const ctx = document.getElementById('revenueChart').getContext('2d');
                    new Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels: labels,
                            datasets: [{
                                label: 'Doanh thu (VNĐ)',
                                data: amounts,
                                backgroundColor: 'rgba(1, 148, 243, 0.7)',
                                borderColor: 'rgba(1, 148, 243, 1)',
                                borderWidth: 1,
                                borderRadius: 5,
                                barPercentage: 0.6
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                legend: { display: false },
                                tooltip: {
                                    callbacks: {
                                        label: function(context) {
                                            return context.raw.toLocaleString('vi-VN') + ' VNĐ';
                                        }
                                    }
                                }
                            },
                            scales: {
                                y: {
                                    beginAtZero: true,
                                    ticks: {
                                        callback: function(value) {
                                            return value.toLocaleString('vi-VN') + ' ₫';
                                        }
                                    }
                                }
                            }
                        }
                    });
                })
                .catch(error => console.error("Lỗi lấy dữ liệu doanh thu:", error));
        });
    </script>
</div>

</body>
</html>
